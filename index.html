<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phoenix Heat & Climate Tracker (2026)</title>
    <meta name="description" content="Tracking extreme temperatures, daily high variations, and dew points for the Phoenix metropolitan area.">
    
    <!-- AI-Readable Schema Markup -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Phoenix Heat Tracker",
      "description": "A local dashboard monitoring extreme heat events and climate data in Phoenix, Arizona.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web"
    }
    </script>

    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #222222;
            --card-bg: #ffffff;
            --border-color: #dddddd;
            --accent-hot: #d9381e;
            --accent-moist: #2b6cb0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
        }

        .stats-display {
            font-size: 2rem;
            font-weight: bold;
            margin: 10px 0 0 0;
        }

        .hot-text { color: var(--accent-hot); }
        .moist-text { color: var(--accent-moist); }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        input, button {
            font-size: 1rem;
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        button {
            background-color: var(--text-color);
            color: var(--card-bg);
            cursor: pointer;
            border: none;
            font-weight: bold;
        }

        button:hover {
            opacity: 0.9;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f4f4f4;
        }

        .table-container {
            overflow-x: auto;
        }
    </style>
</head>
<body>

    <header>
        <h1>Phoenix Heat Tracker</h1>
        <p>Local atmospheric and extreme heat log • GitHub Pages Dashboard</p>
    </header>

    <main>
        <!-- Real-time Metrics Matrix -->
        <section class="dashboard-grid">
            <div class="card">
                <h3>Days ≥ 110°F</h3>
                <p id="count-110" class="stats-display hot-text">0</p>
            </div>
            <div class="card">
                <h3>Current Heat Streak</h3>
                <p id="heat-streak" class="stats-display">0 days</p>
                <small>Consecutive days ≥ 105°F</small>
            </div>
            <div class="card">
                <h3>Max Dew Point Logged</h3>
                <p id="max-dewpoint" class="stats-display moist-text">--°F</p>
            </div>
        </section>

        <div class="dashboard-grid">
            <!-- Data Entry Module -->
            <section class="card">
                <h2>Log Daily Metrics</h2>
                <form id="log-form">
                    <div class="form-group">
                        <label for="log-date">Date</label>
                        <input type="date" id="log-date" required>
                    </div>
                    <div class="form-group">
                        <label for="max-temp">Max Temperature (°F)</label>
                        <input type="number" id="max-temp" min="70" max="130" required>
                    </div>
                    <div class="form-group">
                        <label for="dew-point">Avg/Peak Dew Point (°F)</label>
                        <input type="number" id="dew-point" min="0" max="90" required>
                    </div>
                    <button type="submit">Save Entry</button>
                </form>
            </section>

            <!-- Historical Log Table -->
            <section class="card">
                <h2>Climate Log History</h2>
                <div class="table-container">
                    <table id="data-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Max Temp</th>
                                <th>Dew Point</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Injected via JavaScript -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script>
        // Data State Management (Persistent via localStorage)
        let climateData = JSON.parse(localStorage.getItem('phoenix_heat_data')) || [];

        const logForm = document.getElementById('log-form');
        const tableBody = document.getElementById('table-body');
        
        // Auto-set today's date in form
        document.getElementById('log-date').value = new Date().toISOString().split('T')[0];

        function calculateMetrics() {
            let days110 = 0;
            let maxDew = 0;
            let currentStreak = 0;
            let longestStreak = 0;

            // Sort chronically to evaluate active heat streaks properly
            climateData.sort((a, b) => new Date(a.date) - new Date(b.date));

            climateData.forEach(entry => {
                const temp = parseFloat(entry.maxTemp);
                const dew = parseFloat(entry.dewPoint);

                if (temp >= 110) days110++;
                if (dew > maxDew) maxDew = dew;

                // Heat Streak logic (using 105°F as baseline threshold)
                if (temp >= 105) {
                    currentStreak++;
                } else {
                    currentStreak = 0;
                }
            });

            // DOM updates
            document.getElementById('count-110').textContent = days110;
            document.getElementById('max-dewpoint').textContent = maxDew > 0 ? `${maxDew}°F` : '--°F';
            document.getElementById('heat-streak').textContent = `${currentStreak} days`;
        }

        function updateTable() {
            tableBody.innerHTML = '';
            
            // Display newest first in the visual history table
            const displayData = [...climateData].sort((a, b) => new Date(b.date) - new Date(a.date));

            displayData.forEach(entry => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${entry.date}</td>
                    <td class="${entry.maxTemp >= 110 ? 'hot-text' : ''}">${entry.maxTemp}°F</td>
                    <td>${entry.dewPoint}°F</td>
                `;
                tableBody.appendChild(row);
            });
        }

        logForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const date = document.getElementById('log-date').value;
            const maxTemp = document.getElementById('max-temp').value;
            const dewPoint = document.getElementById('dew-point').value;

            // Prevent duplicate entries for the same date
            climateData = climateData.filter(item => item.date !== date);

            climateData.push({ date, maxTemp, dewPoint });
            localStorage.setItem('phoenix_heat_data', JSON.stringify(climateData));

            logForm.reset();
            document.getElementById('log-date').value = new Date().toISOString().split('T')[0];

            updateTable();
            calculateMetrics();
        });

        // Initialize display on load
        updateTable();
        calculateMetrics();
    </script>
</body>
</html>
